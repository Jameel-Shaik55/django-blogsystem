

{% extends 'base.html' %} {% block content %}
{% load crispy_forms_tags %}

<div class="row">
  <!-- left side bar -->
  <!-- load sidebar.html here -->
  {% include 'dashboard/sidebar.html' %}
  <!-- right side bar -->
  <div class="col-md-9">
    {% if perms.auth.edit_user %}
    <h3 class="text-center">ADD User</h3>

    <div class="row">
        
        <form action="{% url 'edit_user' user.id %}" method="post" style="width: 500px;margin: auto;" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form | crispy}}

        <button type="submit" class="btn btn-primary">Update</button>
        </form>
       
    </div>
    {% else %}
    <h5>You Are Not Allowed to this Page</h5>
    {% endif %}
  </div>
</div>

{% endblock %}
