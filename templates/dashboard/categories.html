{% extends 'base.html' %} {% block content %}

<div class="row">
  <!-- left side bar -->
  <!-- load sidebar.html here -->
  {% include 'dashboard/sidebar.html' %}
  <!-- right side bar -->
  <div class="col-md-9">
    <span>You are logged in as {{ user }}</span>
    <div class="row">
      <a href="{% url 'add_category' %}" class="float-left p-2 mb-2 bg-success text-dark">ADD</a>

      <table class="table table-hover table-bordered">
        <thead>
          <tr>
            <th>#</th>
            <th>Category Name</th>
            <th>Created At</th>
            <th>Updated At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for cat in categories %}
          <tr>
            <th>{{ forloop.counter }}</th>
            <td>{{ cat }}</td>
            <td>{{ cat.created_at }}</td>
            <td>{{ cat.updated_at }}</td>
            <td>
              <a href="{% url 'edit_category' cat.pk %}"><i class="fa fa-edit text-success"></i></a>
              &nbsp;
              <a href="{% url 'delete_category' cat.pk %}"><i class="fa fa-trash text-danger"></i></a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock %}
